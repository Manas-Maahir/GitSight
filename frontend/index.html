<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="GitSight — contribution intelligence and academic-integrity forensics for Git repositories."
    />
    <title>GitSight — Contribution Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply persisted theme before paint to avoid a flash.
      (function () {
        try {
          var stored = localStorage.getItem("gitsight-theme");
          var system = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
          var theme = stored === "light" || stored === "dark" ? stored : (stored === "system" || !stored ? system : system);
          document.documentElement.classList.toggle("dark", theme === "dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
