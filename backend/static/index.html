<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitSight | Contribution Analyzer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b0f19',
                        panelBg: '#13192b',
                        accent: '#3b82f6',
                        accentHover: '#2563eb',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        success: '#10b981'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        .glass-panel {
            background: rgba(19, 25, 43, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .glow-input:focus {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.5);
            outline: none;
        }

        /* Loading spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Fade in animation */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Component for Icons since lucide-react is hard to use via CDN without bundler
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    // Clear existing
                    iconRef.current.innerHTML = "";
                    const iconElement = document.createElement("i");
                    iconElement.setAttribute("data-lucide", name);
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: {
                            class: className,
                            width: size,
                            height: size,
                        }
                    });
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        }

        function Landing({ onAnalyze }) {
            const [url, setUrl] = useState("https://github.com/manas/test-repo"); // Example
            const [loading, setLoading] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                if(!url) return;
                setLoading(true);
                onAnalyze(url).finally(() => setLoading(false));
            }

            return (
                <div className="min-h-screen flex items-center justify-center px-4 relative overflow-hidden">
                    {/* Background decoration */}
                    <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-accent opacity-10 blur-[120px]"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-accent opacity-10 blur-[120px]"></div>
                    
                    <div className="max-w-xl w-full z-10 fade-in">
                        <div className="text-center mb-10">
                            <h1 className="text-5xl font-bold mb-4 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">GitSight</h1>
                            <p className="text-gray-400 text-lg">AI-Assisted Contribution Analyzer</p>
                            <p className="text-sm text-gray-500 mt-2">Uncover the true developers behind collaborative projects.</p>
                        </div>

                        <form onSubmit={handleSubmit} className="glass-panel p-8 rounded-2xl">
                            <div className="mb-6">
                                <label className="block text-sm font-medium text-gray-400 mb-2">Repository URL</label>
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <Icon name="github" size={18} className="text-gray-500" />
                                    </div>
                                    <input 
                                        type="url" 
                                        required
                                        value={url}
                                        onChange={(e) => setUrl(e.target.value)}
                                        placeholder="https://github.com/owner/repo"
                                        className="w-full bg-black/40 border border-gray-700 rounded-lg py-3 pl-10 pr-4 text-white glow-input transition-all"
                                    />
                                </div>
                            </div>
                            
                            <button 
                                type="submit" 
                                disabled={loading}
                                className="w-full bg-accent hover:bg-accentHover text-white font-medium py-3 px-4 rounded-lg transition-all flex items-center justify-center space-x-2 shadow-lg shadow-accent/20"
                            >
                                {loading ? <div className="spinner"></div> : (
                                    <>
                                        <span>Analyze Repository</span>
                                        <Icon name="arrow-right" size={18} />
                                    </>
                                )}
                            </button>
                        </form>
                    </div>
                </div>
            )
        }

        function Dashboard({ data, onBack }) {
            const chartRef = useRef(null);
            
            useEffect(() => {
                if(!chartRef.current || !data) return;
                
                const ctx = chartRef.current.getContext('2d');
                
                // Prepare data for Chart.js
                const labels = data.authors.map(a => a.author);
                const scores = data.authors.map(a => a.score);
                
                const colors = [
                    'rgba(59, 130, 246, 0.8)', // blue
                    'rgba(16, 185, 129, 0.8)', // green
                    'rgba(245, 158, 11, 0.8)', // yellow
                    'rgba(239, 68, 68, 0.8)',  // red
                    'rgba(168, 85, 247, 0.8)', // purple
                ];

                const chart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: scores,
                            backgroundColor: colors.slice(0, labels.length).concat(colors),
                            borderWidth: 0,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '75%',
                        plugins: {
                            legend: {
                                position: 'right',
                                labels: { color: '#9ca3af', font: { family: 'Inter' } }
                            }
                        }
                    }
                });
                
                return () => chart.destroy();
            }, [data]);

            const getRoleStyles = (role) => {
                if (role === "Major Contributor") return "bg-success/20 text-success border-success/30";
                if (role === "Free Rider") return "bg-danger/20 text-danger border-danger/30";
                return "bg-warning/20 text-warning border-warning/30";
            }

            return (
                <div className="min-h-screen p-6 max-w-7xl mx-auto fade-in">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-8 pb-4 border-b border-gray-800">
                        <div>
                            <button onClick={onBack} className="flex items-center text-gray-400 hover:text-white transition-colors mb-2 text-sm">
                                <Icon name="arrow-left" size={16} className="mr-1" /> Back to Search
                            </button>
                            <h2 className="text-2xl font-bold flex items-center">
                                <Icon name="git-pull-request" className="mr-3 text-accent" />
                                {data.repo.split('github.com/')[1]}
                            </h2>
                            <p className="text-gray-500 text-sm mt-1">Total Commits Analyzed: {data.total_commits}</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        
                        {/* Chart Panel */}
                        <div className="glass-panel p-6 rounded-xl flex flex-col">
                            <h3 className="text-lg font-semibold mb-6 flex items-center text-gray-200">
                                <Icon name="pie-chart" className="mr-2 text-gray-400" size={20} />
                                Impact Distribution
                            </h3>
                            <div className="relative flex-grow flex items-center justify-center min-h-[250px]">
                                <canvas ref={chartRef}></canvas>
                                <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                    <div className="text-center">
                                        <div className="text-3xl font-bold">{data.authors.length}</div>
                                        <div className="text-xs text-gray-500">Contributors</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* List Panel */}
                        <div className="glass-panel p-6 rounded-xl lg:col-span-2">
                            <h3 className="text-lg font-semibold mb-6 flex items-center text-gray-200">
                                <Icon name="users" className="mr-2 text-gray-400" size={20} />
                                Team Members & Analysis
                            </h3>
                            <div className="space-y-4">
                                {data.authors.map((a, i) => (
                                    <div key={i} className="bg-black/20 border border-gray-800 rounded-lg p-4 flex flex-col sm:flex-row justify-between sm:items-center hover:border-gray-700 transition-colors">
                                        <div className="flex items-center mb-3 sm:mb-0">
                                            <div className="w-10 h-10 rounded-full bg-gray-800 border border-gray-700 flex items-center justify-center mr-4 shadow-inner">
                                                <Icon name="user" className="text-gray-400" size={20} />
                                            </div>
                                            <div>
                                                <h4 className="font-semibold text-lg text-white">{a.author}</h4>
                                                <div className="text-xs text-gray-500 mt-0.5 space-x-3">
                                                    <span>{a.stats.commits} Commits</span>
                                                    <span>{a.stats.lines_added + a.stats.lines_deleted} Lines</span>
                                                    <span>{a.stats.files_modified} Files</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex items-center space-x-4">
                                            <div className="text-right">
                                                <div className="text-sm font-medium text-gray-300">Impact Score</div>
                                                <div className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-200 to-gray-500">{a.score}</div>
                                            </div>
                                            <div className={`px-3 py-1 rounded-full text-xs font-semibold border ${getRoleStyles(a.role)}`}>
                                                {a.role}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            {/* Insight Alert if free rider found */}
                            {data.authors.some(a => a.role === "Free Rider") && (
                                <div className="mt-6 bg-danger/10 border border-danger/30 rounded-lg p-4 flex items-start">
                                    <Icon name="alert-triangle" className="text-danger mt-0.5 mr-3 flex-shrink-0" size={20} />
                                    <div>
                                        <h5 className="font-bold text-danger text-sm">Potential Imbalance Detected</h5>
                                        <p className="text-danger/80 text-xs mt-1">One or more members have a dramatically lower impact score compared to the group average. This might indicate an uneven distribution of workload or a free-rider scenario.</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            )
        }

        function App() {
            const [data, setData] = useState(null);
            const [error, setError] = useState("");

            const handleAnalyze = async (url) => {
                setError("");
                try {
                    const res = await fetch("/api/analyze", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ url })
                    });
                    const d = await res.json();
                    if (!res.ok) throw new Error(d.detail || "Analysis failed");
                    setData(d);
                } catch (e) {
                    setError(e.message);
                    alert("Error: " + e.message);
                }
            }

            return (
                <div>
                    {!data ? (
                        <Landing onAnalyze={handleAnalyze} />
                    ) : (
                        <Dashboard data={data} onBack={() => setData(null)} />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
